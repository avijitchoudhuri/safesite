<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#080e0a"/>
<title>SafeSite</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080e0a;--surface:#0f1610;--card:#131e14;--border:#1e3020;--green:#22c55e;--blue:#3b82f6;--yellow:#f59e0b;--red:#ef4444;--text:#e8f0e9;--sub:#a0b8a3;--muted:#536857;--in:#0c150d}
html{height:100%;background:var(--bg)}
body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);overflow:hidden}
#errscreen{position:fixed;inset:0;background:#080e0a;color:#22c55e;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;text-align:center;font-family:monospace;font-size:13px;z-index:9999}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px}
.scr::-webkit-scrollbar{display:none}
.hz{height:7px;flex-shrink:0;background:repeating-linear-gradient(-45deg,var(--yellow),var(--yellow) 8px,#111 8px,#111 16px)}
.hd{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.ht{flex:1;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:1.5px}
.bk{background:none;border:none;color:var(--sub);font-size:22px;cursor:pointer;padding:2px 8px 2px 0;line-height:1}
.cd{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.tg{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block}
.btn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;transition:opacity .15s}
.btn:active{opacity:.8}.btn:disabled{opacity:.5;cursor:not-allowed}
.bg{background:var(--green);color:#000}
.bo{background:transparent;border:1px solid var(--border);color:var(--muted)}
.bb{background:var(--blue);color:#fff}
.br{background:var(--red);color:#fff}
.brow{display:flex;gap:8px}.brow .btn{flex:1;padding:13px 8px}
input{width:100%;padding:13px 16px;background:var(--in);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;outline:none}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--green)}
.tb{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:20px}
.t{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;background:transparent;color:var(--muted);transition:all .15s}
.t.on{background:var(--green);color:#000}
.mi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer}
.mi:active{opacity:.7}
.sbig{font-family:'Rajdhani',sans-serif;font-size:68px;font-weight:700;line-height:1}
.rc{border-radius:10px;margin-bottom:12px;overflow:hidden;border-width:1px;border-style:solid}
.rh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 8px}
.rr{display:flex;padding:7px 14px;border-top:1px solid rgba(30,48,32,.6);gap:12px}
.rl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;min-width:110px;padding-top:2px}
.rv{font-size:13px;color:var(--text);line-height:1.6;flex:1}
.dv{display:flex;align-items:center;gap:10px;margin:20px 0}
.dl{flex:1;height:1px;background:var(--border)}
.dt{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.sp{display:flex;gap:14px;margin-bottom:22px}
.sn{width:32px;height:32px;border-radius:50%;background:var(--green);color:#000;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.wb{background:#1a0e00;border:1px solid rgba(245,158,11,.35);border-radius:12px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.eb{background:#1e0808;border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 14px;margin-bottom:12px;color:#fca5a5;font-size:13px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100}
.mb{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:320px;text-align:center}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pu{animation:pulse 1.5s ease-in-out infinite}
.dots{display:flex;justify-content:center;gap:6px;margin-top:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
.ri{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer}
.rt{width:52px;height:52px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.rd{border:1px solid rgba(239,68,68,.3);border-radius:7px;padding:6px 10px;font-size:10px;font-weight:700;color:var(--red);cursor:pointer;background:none;flex-shrink:0}
.pi{width:100%;max-height:280px;object-fit:cover;border-radius:12px;border:1px solid var(--border);display:block;margin-bottom:16px}
.ar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.lw{width:80px;height:80px;border-radius:20px;background:var(--card);border:2px solid var(--green);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 0 32px rgba(34,197,94,.15)}
.kr{display:flex;gap:8px;margin-bottom:10px}
.ki{flex:1;font-family:monospace;font-size:13px}
.ey{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0 12px;cursor:pointer;font-size:18px}
.ib{background:#08101a;border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:14px;margin-top:4px}
.em{text-align:center;padding:60px 20px}
.row{display:flex;align-items:center;gap:10px}
.rsb{display:flex;justify-content:space-between;align-items:center}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.tc{text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
// Global error handler — shows error on screen instead of black screen
window.onerror = function(msg, src, line, col, err) {
  var es = document.getElementById('errscreen');
  if (!es) { es = document.createElement('div'); es.id='errscreen'; document.body.appendChild(es); }
  es.style.display='flex';
  es.innerHTML = '<div style="font-size:32px;margin-bottom:16px">⚠️</div>' +
    '<div style="color:#22c55e;font-weight:700;font-size:16px;margin-bottom:12px">SafeSite Error</div>' +
    '<div style="color:#a0b8a3;word-break:break-all">' + msg + '<br><br>Line: ' + line + '</div>';
  return false;
};

// Storage with memory fallback (in case localStorage is blocked)
var MEM = {};
function store_get(k) { try { return localStorage.getItem(k); } catch(e) { return MEM[k]||null; } }
function store_set(k,v) { try { localStorage.setItem(k,v); } catch(e) { MEM[k]=v; } }

var LABELS = ['','Very Unsafe','Unsafe','Moderate Risk','Safe','Very Safe'];
var EMOJI  = ['','🔴','🟠','🟡','🟢','✅'];
var SC = function(s){ return s<=2?'var(--red)':s===3?'var(--yellow)':'var(--green)'; };
var RC = function(s){ return s>=15?'var(--red)':s>=8?'var(--yellow)':'var(--green)'; };
var RB = function(s){ return s>=15?'#180808':s>=8?'#191200':'#081308'; };

var S = {
  view:'login', mode:'login',
  user:null, key:'', keyDraft:'', keyShow:false,
  img:null, busy:false, result:null, err:'',
  reports:[], viewing:null, saved:false, delId:null,
  email:'', pass:'', name:'', authErr:''
};

function getUsers()   { try{return JSON.parse(store_get('ss:u')||'[]');}catch(e){return[];} }
function putUsers(u)  { store_set('ss:u',JSON.stringify(u)); }
function getRpts(e)   { try{return JSON.parse(store_get('ss:r:'+e)||'[]');}catch(e){return[];} }
function putRpts(e,r) { store_set('ss:r:'+e,JSON.stringify(r)); }
function getKey(e)    { return store_get('ss:k:'+e)||''; }
function putKey(e,k)  { store_set('ss:k:'+e,k); }

function h(tag,props,kids){
  var el=document.createElement(tag);
  if(props) Object.keys(props).forEach(function(k){
    var v=props[k];
    if(k==='cls') el.className=v;
    else if(k==='html') el.innerHTML=v;
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='click') el.onclick=v;
    else if(k==='change') el.onchange=v;
    else if(k==='input') el.oninput=v;
    else if(k==='keydown') el.onkeydown=v;
    else el.setAttribute(k,v);
  });
  var ch = kids ? (Array.isArray(kids)?kids:[kids]) : [];
  ch.forEach(function(c){
    if(c==null) return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}
function d(cls,kids){ return h('div',{cls:cls},kids); }
function p(cls,text){ return h('p',{cls:cls},[text]); }
function span(text,style){ var e=document.createElement('span'); e.textContent=text; if(style) Object.assign(e.style,style); return e; }
function btn(lbl,cls,fn,dis){
  var el=h('button',{cls:'btn '+cls,click:fn},[lbl]);
  if(dis) el.disabled=true;
  return el;
}
function hz(){ return d('hz'); }
function logo(){
  var w=d('lw');
  w.innerHTML='<span style="font-size:38px;line-height:1.1">⛑️</span><span style="font-size:18px;margin-top:-4px">⚙️</span>';
  return w;
}
function hdr(title,back,right){
  var el=d('hd');
  if(back) el.appendChild(h('button',{cls:'bk',click:back},['←']));
  el.appendChild(h('span',{cls:'ht'},[title]));
  if(right) el.appendChild(right);
  return el;
}

function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  try {
    var scr = (S.view==='login')?sLogin():
              (S.view==='home')?sHome():
              (S.view==='preview')?sPreview():
              (S.view==='results')?sReport(S.result,false):
              (S.view==='view')?sReport(S.viewing,true):
              (S.view==='history')?sHistory():
              (S.view==='settings')?sSettings():
              (S.view==='about')?sAbout():sLogin();
    app.appendChild(scr);
  } catch(e) {
    app.innerHTML='<div style="padding:24px;color:#fca5a5;font-size:13px"><b>Render error:</b><br>'+e.message+'</div>';
  }
}

function sLogin(){
  var wrap=d('screen');
  wrap.appendChild(hz());
  var scr=d('scr'); scr.style.paddingTop='44px'; scr.style.paddingBottom='60px';

  var top=d('tc'); top.style.marginBottom='32px';
  top.appendChild(logo());
  top.appendChild(h('h1',{style:{fontFamily:'Rajdhani,sans-serif',fontSize:'24px',fontWeight:'700',color:'var(--green)',letterSpacing:'2.5px',marginTop:'16px',marginBottom:'4px'}},['SAFESITE']));
  top.appendChild(h('p',{style:{color:'var(--muted)',fontSize:'11px',letterSpacing:'1px'}},['CONSTRUCTION SITE RISK ASSESSMENT']));
  scr.appendChild(top);

  var tabs=d('tb');
  ['login','signup'].forEach(function(m){
    var t=h('button',{cls:'t'+(S.mode===m?' on':''),click:function(){S.mode=m;S.authErr='';render();}},
      [m==='login'?'LOG IN':'SIGN UP']);
    tabs.appendChild(t);
  });
  scr.appendChild(tabs);

  var fw=d(''); fw.style.cssText='display:flex;flex-direction:column;gap:10px';
  if(S.mode==='signup'){
    var ni=h('input',{type:'text',placeholder:'Full Name',value:S.name,input:function(e){S.name=e.target.value;}});
    fw.appendChild(ni);
  }
  var ei=h('input',{type:'email',placeholder:'Email Address',value:S.email,autocapitalize:'none',input:function(e){S.email=e.target.value;}});
  var pi=h('input',{type:'password',placeholder:S.mode==='signup'?'Password (min. 6 characters)':'Password',value:S.pass,input:function(e){S.pass=e.target.value;},keydown:function(e){if(e.key==='Enter')doAuth();}});
  fw.appendChild(ei); fw.appendChild(pi);
  scr.appendChild(fw);

  if(S.authErr){
    var eb=d('eb'); eb.style.marginTop='10px'; eb.textContent='⚠ '+S.authErr;
    scr.appendChild(eb);
  }

  var bb=d(''); bb.style.marginTop='16px';
  bb.appendChild(btn(S.mode==='login'?'LOG IN  →':'CREATE ACCOUNT  →','bg',doAuth));
  scr.appendChild(bb);

  var ft=d('cd'); ft.style.marginTop='44px'; ft.style.textAlign='center';
  ft.innerHTML='<p style="color:var(--sub);font-size:13px;line-height:2">Made in India with ❤️ for construction<br>© Avijit Choudhuri<br>Version 1.0 – March 2026<br><span style="color:var(--muted)">brainquisitive@gmail.com</span></p>';
  scr.appendChild(ft);
  wrap.appendChild(scr);
  wrap.appendChild(hz());
  return wrap;
}

function sHome(){
  var wrap=d('screen');
  wrap.appendChild(hz());
  var rb=d('row');
  rb.appendChild(h('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:'20px',padding:'2px'},click:function(){S.view='settings';render();}},['⚙️']));
  rb.appendChild(h('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:'20px',padding:'2px'},click:function(){S.view='about';render();}},['ℹ️']));
  rb.appendChild(h('button',{style:{border:'1px solid var(--border)',borderRadius:'6px',padding:'5px 10px',fontSize:'10px',fontFamily:'Rajdhani,sans-serif',fontWeight:'700',color:'var(--muted)',background:'none',cursor:'pointer'},click:doLogout},['LOG OUT']));
  wrap.appendChild(hdr('SAFESITE',null,rb));
  var scr=d('scr');
  var fname=(S.user&&S.user.name)?S.user.name.split(' ')[0]:'there';
  var wl=d(''); wl.style.marginBottom='18px';
  wl.innerHTML='<p class="tg" style="margin-bottom:4px">Welcome back</p><h2 style="font-size:22px;font-weight:700;color:var(--text)">Hello, '+fname+' 👷</h2>';
  scr.appendChild(wl);

  if(!S.key){
    var wb=d('wb'); wb.onclick=function(){S.view='settings';render();};
    wb.innerHTML='<span style="font-size:22px">⚠️</span><div style="flex:1"><div style="color:var(--yellow);font-weight:700;font-size:13px;margin-bottom:2px">API Key Not Set</div><div style="color:var(--sub);font-size:12px;line-height:1.6">You need an Anthropic API key to analyze sites. Tap here.</div></div><span style="color:var(--yellow);font-size:18px">›</span>';
    scr.appendChild(wb);
  }
  scr.appendChild(h('p',{style:{fontSize:'13px',color:'var(--sub)',marginBottom:'18px',lineHeight:'1.7'}},['Give me a snap of your construction site']));

  var gi=h('input',{type:'file',accept:'image/*',style:{display:'none'},change:function(e){onFile(e);}});
  var ci=h('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'},change:function(e){onFile(e);}});
  scr.appendChild(gi); scr.appendChild(ci);

  var items=[
    {i:'📷',l:'Camera',s:'Capture a new photo of the site',a:'var(--green)',fn:function(){ci.click();}},
    {i:'🖼️',l:'Gallery',s:'Upload an existing photo from device',a:'var(--yellow)',fn:function(){gi.click();}},
    {i:'📋',l:'Review Earlier Output',s:S.reports.length+' saved report'+(S.reports.length!==1?'s':''),a:'var(--blue)',fn:function(){S.view='history';render();}},
  ];
  items.forEach(function(item){
    var row=d('mi'); row.style.borderLeft='4px solid '+item.a; row.onclick=item.fn;
    row.innerHTML='<span style="font-size:28px;min-width:40px;text-align:center">'+item.i+'</span><div style="flex:1"><div style="font-family:Rajdhani,sans-serif;font-weight:700;font-size:16px;color:var(--text)">'+item.l+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+item.s+'</div></div><span style="color:var(--muted);font-size:20px;margin-left:auto">›</span>';
    scr.appendChild(row);
  });
  wrap.appendChild(scr);
  wrap.appendChild(hz());
  return wrap;
}

function sPreview(){
  var wrap=d('screen');
  wrap.appendChild(hz());
  wrap.appendChild(hdr('PREVIEW IMAGE',function(){S.view='home';S.img=null;S.err='';render();}));
  var scr=d('scr');
  if(S.img) scr.appendChild(h('img',{cls:'pi',src:S.img.url}));
  if(S.err==='resolution'){ scr.appendChild(ecard('🔍','PHOTO CLARITY INSUFFICIENT','Please upload a clearer construction site image.','var(--red)')); }
  else if(S.err==='not_construction_site'){ scr.appendChild(ecard('🚫','NOT A CONSTRUCTION SITE','Uploaded image does not appear to be a construction site.','var(--red)')); }
  else if(S.err==='invalid_key'){
    var c=ecard('🔑','INVALID API KEY','Your API key was not accepted. Please check it in Settings.','var(--yellow)');
    var bb=d(''); bb.style.marginTop='14px'; bb.appendChild(btn('GO TO SETTINGS','bg',function(){S.view='settings';render();}));
    c.appendChild(bb); scr.appendChild(c);
  } else if(S.err==='error'){
    var eb=d('eb'); eb.textContent='⚠ Analysis failed. '+(S.errMsg||'Please check your internet connection and try again.'); scr.appendChild(eb);
  }
  if(S.busy){
    var lw=d('cd tc'); lw.style.padding='40px 20px'; lw.style.marginBottom='14px';
    lw.innerHTML='<div class="pu" style="font-size:44px;margin-bottom:14px">🔍</div><div style="font-family:Rajdhani,sans-serif;font-size:16px;color:var(--green);letter-spacing:3px;margin-bottom:8px">ANALYZING SITE...</div><div style="font-size:12px;color:var(--muted);margin-bottom:20px">Identifying safety hazards and risks</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    scr.appendChild(lw);
  }
  if(!S.busy&&!S.err){
    var ab=d(''); ab.style.marginBottom='10px'; ab.appendChild(btn('🔍   ANALYZE SAFETY RISKS','bg',doAnalyze)); scr.appendChild(ab);
  }
  scr.appendChild(btn('← BACK TO HOME','bo',function(){S.view='home';S.img=null;S.err='';render();}));
  wrap.appendChild(scr);
  return wrap;
}

function ecard(icon,title,body,color){
  var c=d('cd tc'); c.style.marginBottom='14px';
  c.innerHTML='<div style="font-size:36px;margin-bottom:10px">'+icon+'</div><div style="font-weight:700;color:'+color+';font-size:15px;letter-spacing:1px;margin-bottom:8px">'+title+'</div><div style="font-size:13px;color:var(--sub);line-height:1.7">'+body+'</div>';
  return c;
}

function sReport(res,isHist){
  if(!res) return sHome();
  var sc=res.overallSafetyScore;
  var wrap=d('screen');
  wrap.appendChild(hz());
  var de=span(new Date(res.analyzedAt).toLocaleDateString('en-IN'),{fontSize:'11px',color:'var(--muted)'});
  wrap.appendChild(hdr('SAFETY REPORT',function(){if(isHist){S.viewing=null;S.view='history';}else{S.view='home';}render();},de));
  var scr=d('scr');
  if(res.imageDataUrl) scr.appendChild(h('img',{cls:'pi',src:res.imageDataUrl,style:{maxHeight:'160px'}}));
  var sc_c=d('cd tc mb16'); sc_c.style.borderColor=SC(sc)+'44';
  sc_c.innerHTML='<span class="tg">Overall Safety Score</span><div class="sbig" style="color:'+SC(sc)+';margin:10px 0 4px">'+sc+'<span style="font-size:22px;color:var(--muted);font-weight:400">/5</span></div><div style="font-family:Rajdhani,sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;color:'+SC(sc)+';margin-bottom:12px">'+EMOJI[sc]+'  '+LABELS[sc].toUpperCase()+'</div><p style="font-size:13px;color:var(--sub);line-height:1.7">'+res.summaryComment+'</p>';
  scr.appendChild(sc_c);
  var rl=h('span',{cls:'tg',style:{display:'block',marginBottom:'12px'}},[res.risks.length+' Risks Identified']);
  scr.appendChild(rl);
  res.risks.forEach(function(r){
    var rc=d('rc'); rc.style.borderColor=RC(r.riskScore)+'33'; rc.style.borderLeftColor=RC(r.riskScore); rc.style.borderLeftWidth='4px'; rc.style.background=RB(r.riskScore);
    var rh=d('rh'); rh.innerHTML='<span style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px">'+r.riskId+'</span><span style="font-size:22px;font-weight:700;color:'+RC(r.riskScore)+';font-family:Rajdhani,sans-serif">'+r.riskScore+'<span style="font-size:11px;color:var(--muted)">/25</span></span>';
    rc.appendChild(rh);
    [['RISK DESCRIPTION',r.riskDescription],['IMPACT SCORE',r.impactScore+' / 5'],['LIKELIHOOD SCORE',r.likelihoodScore+' / 5'],['RISK SCORE',r.riskScore+' / 25'],['SUGGESTED IMPROVEMENT',r.suggestedImprovement]].forEach(function(pair){
      var row=d('rr'); row.innerHTML='<div class="rl">'+pair[0]+'</div><div class="rv">'+pair[1]+'</div>'; rc.appendChild(row);
    });
    scr.appendChild(rc);
  });
  var conf=d('cd mb16'); conf.style.background='#0a100a';
  var cc=res.confidenceLevel==='High'?'var(--green)':res.confidenceLevel==='Medium'?'var(--yellow)':'var(--red)';
  conf.innerHTML='<div class="rsb mb8"><span class="tg">AI Confidence Level</span><span style="font-weight:700;font-size:14px;color:'+cc+'">'+res.confidenceLevel+'</span></div><p style="font-size:11px;color:var(--muted);line-height:1.8;font-style:italic">⚠️ This risk register is machine generated. Manual checking by a qualified expert is strongly recommended.</p>';
  scr.appendChild(conf);
  var br=d('brow mb20');
  if(!isHist) br.appendChild(btn(S.saved?'✓ SAVED':'💾 SAVE',S.saved?'bo':'bg',doSave,S.saved));
  br.appendChild(btn('📥 DOWNLOAD','bb',function(){dlCSV(res);}));
  br.appendChild(btn('🏠 HOME','bo',function(){S.viewing=null;S.view='home';render();}));
  scr.appendChild(br);
  wrap.appendChild(scr);
  return wrap;
}

function sHistory(){
  var wrap=d('screen');
  wrap.appendChild(hz());
  var ce=span(S.reports.length+' report'+(S.reports.length!==1?'s':''),{fontSize:'11px',color:'var(--muted)'});
  wrap.appendChild(hdr('EARLIER REPORTS',function(){S.view='home';render();},ce));
  if(S.reports.length===0){
    var scr=d('scr'); var em=d('em');
    em.innerHTML='<div style="font-size:52px;opacity:.25;margin-bottom:16px">📋</div><div style="color:var(--muted);font-size:14px;line-height:1.8">No saved reports yet.<br>Analyze a site and tap Save.</div>';
    var gb=d(''); gb.style.marginTop='20px'; gb.appendChild(btn('GO TO HOME','bg',function(){S.view='home';render();}));
    em.appendChild(gb); scr.appendChild(em); wrap.appendChild(scr); return wrap;
  }
  var scr=d('scr');
  S.reports.forEach(function(rpt){
    var item=d('ri');
    if(rpt.imageDataUrl) item.appendChild(h('img',{cls:'rt',src:rpt.imageDataUrl}));
    var info=d(''); info.style.flex='1';
    var tr=d('rsb mb8'); tr.innerHTML='<span style="font-weight:700;font-size:14px">Score: <span style="color:'+SC(rpt.overallSafetyScore)+'">'+rpt.overallSafetyScore+'/5</span></span><span style="font-weight:700;font-size:11px;color:'+SC(rpt.overallSafetyScore)+'">'+LABELS[rpt.overallSafetyScore]+'</span>';
    info.appendChild(tr);
    info.appendChild(span(new Date(rpt.savedAt).toLocaleString('en-IN')+' · '+rpt.risks.length+' risks',{fontSize:'11px',color:'var(--muted)'}));
    item.appendChild(info);
    (function(r){ item.onclick=function(e){if(e.target.classList.contains('rd'))return; S.viewing=r;S.view='view';render();}; })(rpt);
    (function(id){ item.appendChild(h('button',{cls:'rd',click:function(e){e.stopPropagation();S.delId=id;render();}},'DEL')); })(rpt.id);
    scr.appendChild(item);
  });
  wrap.appendChild(scr);
  if(S.delId){
    var ov=d('mo'); var mb=d('mb');
    mb.innerHTML='<div style="font-size:32px;margin-bottom:12px">🗑️</div><div style="font-weight:700;font-size:16px;margin-bottom:8px">DELETE REPORT?</div><div style="font-size:13px;color:var(--muted);margin-bottom:20px">This action cannot be undone.</div>';
    var br=d('brow');
    br.appendChild(btn('CANCEL','bo',function(){S.delId=null;render();}));
    (function(id){br.appendChild(btn('DELETE','br',function(){doDel(id);}));})(S.delId);
    mb.appendChild(br); ov.appendChild(mb); wrap.appendChild(ov);
  }
  return wrap;
}

function sSettings(){
  var wrap=d('screen');
  wrap.appendChild(hz());
  wrap.appendChild(hdr('SETTINGS',function(){S.view='home';render();}));
  var scr=d('scr'); scr.style.paddingBottom='48px';
  var kc=d('cd mb20'); kc.style.borderColor=S.key?'rgba(34,197,94,0.3)':'rgba(245,158,11,0.3)';
  var kh=d('row mb12');
  kh.innerHTML='<span style="font-size:28px">'+(S.key?'🔑':'🔓')+'</span><div style="flex:1"><div style="font-weight:700;font-size:15px">Anthropic API Key</div><div style="font-size:12px;font-weight:600;margin-top:2px;color:'+(S.key?'var(--green)':'var(--yellow)')+'"> '+(S.key?'✓ Key saved and active':'Not set — required to analyze photos')+'</div></div>';
  kc.appendChild(kh);
  var kr=d('kr');
  var ki=h('input',{type:S.keyShow?'text':'password',placeholder:'Paste your key here  (sk-ant-...)',value:S.keyDraft,cls:'ki',autocomplete:'off',autocapitalize:'none',input:function(e){S.keyDraft=e.target.value;}});
  var ey=h('button',{cls:'ey',click:function(){S.keyShow=!S.keyShow;render();}},[S.keyShow?'🙈':'👁️']);
  kr.appendChild(ki); kr.appendChild(ey); kc.appendChild(kr);
  kc.appendChild(btn('💾  SAVE API KEY','bg',doSaveKey));
  if(S.key){var rd=d(''); rd.style.marginTop='8px'; rd.appendChild(btn('🗑️  REMOVE KEY','br',doRemKey)); kc.appendChild(rd);}
  scr.appendChild(kc);
  var dv=d('dv');
  dv.innerHTML='<div class="dl"></div><div class="dt">HOW TO GET YOUR API KEY</div><div class="dl"></div>';
  scr.appendChild(dv);
  [{n:'1',t:'Open the Anthropic Console',b:'Tap the link below to open Anthropic\'s website in your browser.',url:'https://console.anthropic.com',ul:'→  Open console.anthropic.com'},
   {n:'2',t:'Create a Pay-As-You-Go Account',b:'Tap "Sign Up". Enter your email and create a password. Verify your email. Then go to "Billing" and add your card. No monthly fee — pay only for what you use.'},
   {n:'3',t:'Go to "API Keys"',b:'In the left menu tap "API Keys". Tap "Create Key". Name it "SafeSite App".'},
   {n:'4',t:'Copy Your API Key',b:'Your key starts with "sk-ant-...". Tap Copy.\n\n⚠️ Shown only once — save it somewhere safe!'},
   {n:'5',t:'Paste It Here',b:'Come back here, paste the key above, tap "Save API Key". Status turns green. You\'re all set!'},
  ].forEach(function(s){
    var sb=d('sp');
    var sn=d('sn'); sn.textContent=s.n;
    var bd=d(''); bd.style.flex='1';
    var st=d(''); st.style.cssText='font-weight:700;font-size:14px;color:var(--text);margin-bottom:5px'; st.textContent=s.t;
    var sb2=d(''); sb2.style.cssText='font-size:13px;color:var(--sub);line-height:1.7;white-space:pre-wrap'; sb2.textContent=s.b;
    bd.appendChild(st); bd.appendChild(sb2);
    if(s.url){ var a=h('a',{href:s.url,target:'_blank',style:{color:'var(--green)',fontSize:'13px',fontWeight:'600',textDecoration:'underline',display:'inline-block',marginTop:'6px'}},[s.ul]); bd.appendChild(a); }
    sb.appendChild(sn); sb.appendChild(bd); scr.appendChild(sb);
  });
  var ib=d('ib');
  ib.innerHTML='<div style="color:var(--blue);font-weight:700;font-size:13px;margin-bottom:8px">💡 About Costs & Privacy</div><div style="font-size:12px;color:var(--sub);line-height:1.8">Your API key is stored only in your browser — never shared with anyone.<br><br>Each site analysis costs approximately <strong style="color:var(--text)">₹0.80 – ₹1.50</strong> (less than 2 US cents). Anthropic bills you directly.<br><br>Monitor usage at <a href="https://console.anthropic.com" target="_blank" style="color:var(--blue)">console.anthropic.com</a> under "Usage".</div>';
  scr.appendChild(ib);
  var bb=d(''); bb.style.marginTop='24px'; bb.appendChild(btn('← BACK TO HOME','bo',function(){S.view='home';render();})); scr.appendChild(bb);
  wrap.appendChild(scr);
  return wrap;
}

function sAbout(){
  var wrap=d('screen');
  wrap.appendChild(hz());
  wrap.appendChild(hdr('ABOUT',function(){S.view='home';render();}));
  var scr=d('scr'); scr.style.paddingTop='40px'; scr.style.textAlign='center';
  scr.appendChild(logo());
  scr.innerHTML+='<h2 style="font-family:Rajdhani,sans-serif;font-size:22px;font-weight:700;color:var(--green);letter-spacing:2px;margin-top:18px;margin-bottom:6px">SAFESITE</h2><p style="color:var(--muted);font-size:11px;margin-bottom:32px;letter-spacing:1px">CONSTRUCTION SITE RISK ASSESSMENT</p>';
  var card=d('cd'); card.style.textAlign='left';
  [['Made in','India with ❤️ for construction'],['Copyright','© Avijit Choudhuri'],['Version','1.0 – March 2026'],['Contact','brainquisitive@gmail.com']].forEach(function(pair){
    var row=d('ar');
    var l=document.createElement('span'); l.className='tg'; l.textContent=pair[0];
    var v=document.createElement('span'); v.style.cssText='font-size:13px;color:var(--sub)'; v.textContent=pair[1];
    row.appendChild(l); row.appendChild(v); card.appendChild(row);
  });
  scr.appendChild(card);
  var bb=d(''); bb.style.marginTop='24px'; bb.appendChild(btn('← BACK TO HOME','bg',function(){S.view='home';render();})); scr.appendChild(bb);
  wrap.appendChild(scr);
  return wrap;
}

function doAuth(){
  S.authErr='';
  if(!S.email||!S.pass){S.authErr='Please fill all required fields.';render();return;}
  var users=getUsers();
  if(S.mode==='login'){
    var u=null; for(var i=0;i<users.length;i++){if(users[i].email.toLowerCase()===S.email.toLowerCase()&&users[i].pass===S.pass){u=users[i];break;}}
    if(!u){S.authErr='Invalid email or password.';render();return;}
    S.user=u; S.key=getKey(u.email); S.keyDraft=S.key; S.reports=getRpts(u.email); S.view='home'; render();
  } else {
    if(!S.name.trim()){S.authErr='Please enter your full name.';render();return;}
    if(S.pass.length<6){S.authErr='Password must be at least 6 characters.';render();return;}
    var exists=false; for(var i=0;i<users.length;i++){if(users[i].email.toLowerCase()===S.email.toLowerCase()){exists=true;break;}}
    if(exists){S.authErr='Email already registered. Please log in.';render();return;}
    var nu={email:S.email.toLowerCase().trim(),pass:S.pass,name:S.name.trim()};
    putUsers(users.concat([nu]));
    S.user=nu; S.reports=[]; S.key=''; S.keyDraft=''; S.view='home'; render();
  }
}

function doLogout(){
  S.user=null;S.view='login';S.email='';S.pass='';S.name='';
  S.img=null;S.result=null;S.reports=[];S.saved=false;S.err='';S.key='';S.keyDraft='';render();
}

function doSaveKey(){
  var k=S.keyDraft.trim();
  if(!k.startsWith('sk-ant-')){alert('Your key should start with "sk-ant-". Please check and try it again.');return;}
  putKey(S.user.email,k);S.key=k;
  alert('✅ API key saved! You can now analyze sites.');render();
}

function doRemKey(){
  if(!confirm('Remove your API key?'))return;
  putKey(S.user.email,'');S.key='';S.keyDraft='';render();
}

function onFile(e){
  if(!S.key){if(confirm('Set your Anthropic API key first.\n\nGo to Settings now?')){S.view='settings';render();}return;}
  var file=e.target.files[0]; if(!file)return; e.target.value='';
  var reader=new FileReader();
  reader.onload=function(ev){S.img={url:ev.target.result,mime:file.type||'image/jpeg'};S.err='';S.saved=false;S.view='preview';render();};
  reader.readAsDataURL(file);
}

function doAnalyze(){
  if(!S.img||S.busy)return;
  S.busy=true;S.err='';render();
  var b64=S.img.url.split(',')[1];
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:S.img.mime,data:b64}},
        {type:'text',text:'You are a certified construction site safety inspector. Analyze this image and respond ONLY with valid JSON — no markdown, no explanation.\n\nIf too blurry: {"valid":false,"reason":"resolution"}\nIf not a construction site: {"valid":false,"reason":"not_construction_site"}\n\nIf valid: {"valid":true,"overallSafetyScore":<1-5>,"summaryComment":"<2-3 sentences>","confidenceLevel":"<High|Medium|Low>","risks":[{"riskId":"R001","riskDescription":"<hazard>","impactScore":<1-5>,"likelihoodScore":<1-5>,"riskScore":<product>,"suggestedImprovement":"<action>"}]}\n\nIdentify 3-7 risks. Be specific to what you see.'}
      ]}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error){S.errMsg='API error: '+d.error.type+' — '+d.error.message; S.err=d.error.type==='authentication_error'?'invalid_key':'error';S.busy=false;render();return;}
    var txt=(d.content||[]).map(function(b){return b.text||'';}).join('');
    var res;
    try { res=JSON.parse(txt.replace(/```json|```/g,'').trim()); }
    catch(pe){ S.errMsg='JSON parse error: '+pe.message+' | Raw: '+txt.slice(0,80); S.err='error'; S.busy=false; render(); return; }
    if(!res.valid){S.err=res.reason||'error';}
    else{res.analyzedAt=new Date().toISOString();res.imageDataUrl=S.img.url;S.result=res;S.saved=false;S.view='results';}
    S.busy=false;render();
  }).catch(function(e){console.error(e);S.errMsg='Network error: '+e.message;S.err='error';S.busy=false;render();});
}

function doSave(){
  if(!S.result||S.saved)return;
  var rpt=Object.assign({id:Date.now().toString(),savedAt:new Date().toISOString()},S.result);
  S.reports=[rpt].concat(S.reports);putRpts(S.user.email,S.reports);S.saved=true;render();
  alert('✅ Report saved successfully.');
}

function doDel(id){
  S.reports=S.reports.filter(function(r){return r.id!==id;});putRpts(S.user.email,S.reports);
  S.delId=null;if(S.viewing&&S.viewing.id===id){S.viewing=null;S.view='history';}render();
}

function dlCSV(res){
  function esc(v){return '"'+String(v).replace(/"/g,'""')+'"';}
  var lines=[esc('SafeSite — SAFETY REPORT'),'',
    [esc('Analyzed on'),esc(new Date(res.analyzedAt).toLocaleString())].join(','),
    [esc('Analyzed by'),esc(S.user?S.user.name:'')].join(','),'',
    [esc('OVERALL SAFETY SCORE'),esc(res.overallSafetyScore+' / 5')].join(','),
    [esc('SAFETY RATING'),esc(LABELS[res.overallSafetyScore]||'')].join(','),
    [esc('SUMMARY'),esc(res.summaryComment)].join(','),
    [esc('AI CONFIDENCE'),esc(res.confidenceLevel)].join(','),'',
    [esc('DISCLAIMER'),esc('Machine generated. Manual expert inspection strongly recommended.')].join(','),'',
    [esc('Risk ID'),esc('Risk Description'),esc('Impact (1-5)'),esc('Likelihood (1-5)'),esc('Risk Score (1-25)'),esc('Suggested Improvement')].join(',')
  ];
  res.risks.forEach(function(r){lines.push([esc(r.riskId),esc(r.riskDescription),esc(r.impactScore),esc(r.likelihoodScore),esc(r.riskScore),esc(r.suggestedImprovement)].join(','));});
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='SafeSite_Report_'+new Date(res.analyzedAt).toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// Boot
try { render(); } catch(e) {
  document.getElementById('app').innerHTML='<div style="padding:24px;color:#fca5a5;font-size:13px"><b>Boot error:</b><br>'+e.message+'</div>';
}
</script>
